name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production + preview
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          RSYNC="rsync -avz --delete -e 'ssh -i ~/.ssh/deploy_key'"

          # Deploy to both production and preview
          eval $RSYNC dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/software-crafting/dist/
          eval $RSYNC dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/software-crafting-preview/dist/

          # Restart both PM2 processes
          $SSH "cd /var/www/software-crafting && pm2 startOrRestart ecosystem.config.cjs --update-env"
          $SSH "cd /var/www/software-crafting-preview && pm2 startOrRestart ecosystem.config.cjs --update-env"

      - name: Health check
        run: |
          sleep 5
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          $SSH "curl -sf --max-time 10 http://localhost:4321/ > /dev/null && echo 'Production OK' || (pm2 logs software-crafting --nostream --lines 20 && exit 1)"
          $SSH "curl -sf --max-time 10 http://localhost:4322/ > /dev/null && echo 'Preview OK' || (pm2 logs software-crafting-preview --nostream --lines 20 && exit 1)"
