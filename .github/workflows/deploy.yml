name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro website
        run: pnpm --filter @portal/website build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build Next.js portal
        run: pnpm --filter @portal/portal build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Astro website
        run: |
          RSYNC="rsync -avz --delete -e 'ssh -i ~/.ssh/deploy_key'"
          # --exclude preserves client preview symlinks that point to /var/www/portal-assets/
          eval $RSYNC --exclude='client/preview/' packages/website/dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/software-crafting/dist/

      - name: Deploy Next.js portal
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          RSYNC="rsync -avz --delete -e 'ssh -i ~/.ssh/deploy_key'"
          PORTAL_DIR=/var/www/software-crafting-preview

          # Deploy standalone server (--exclude preserves .env and ecosystem config)
          eval $RSYNC --exclude='.env' --exclude='ecosystem.config.cjs' \
            packages/portal/.next/standalone/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$PORTAL_DIR/

          # Deploy static assets to nested path (Next.js standalone monorepo structure)
          eval $RSYNC \
            packages/portal/.next/static/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$PORTAL_DIR/packages/portal/.next/static/

          # Ensure .env exists with correct values (idempotent)
          $SSH "cat > $PORTAL_DIR/.env << 'ENVEOF'
NEXT_PUBLIC_SUPABASE_URL=${{ secrets.PUBLIC_SUPABASE_URL }}
NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
ENVEOF
          cp $PORTAL_DIR/.env $PORTAL_DIR/packages/portal/.env"

          # Ensure ecosystem config exists
          $SSH "cat > $PORTAL_DIR/ecosystem.config.cjs << 'PMEOF'
module.exports = {
  apps: [{
    name: 'software-crafting-portal',
    script: 'packages/portal/server.js',
    env: { NODE_ENV: 'production', PORT: 4322, HOSTNAME: '::1' },
  }],
};
PMEOF"

      - name: Restart PM2 processes
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          $SSH "cd /var/www/software-crafting && pm2 startOrRestart ecosystem.config.cjs --update-env"
          $SSH "cd /var/www/software-crafting-preview && pm2 startOrRestart ecosystem.config.cjs --update-env"

      - name: Health check
        run: |
          sleep 5
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          $SSH "curl -sf --max-time 10 http://localhost:4321/ > /dev/null && echo 'Astro website OK' || (pm2 logs software-crafting --nostream --lines 20 && exit 1)"
          $SSH "curl -sf --max-time 10 http://[::1]:4322/portal/login > /dev/null && echo 'Next.js portal OK' || (pm2 logs software-crafting-portal --nostream --lines 20 && exit 1)"
