<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Software Crafting — Coming Soon</title>
  <meta name="description" content="Software Crafting — Webdesign, Branding & digitale Strategien. Unsere neue Website entsteht gerade.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: oklch(0.55 0.2 280);
      --primary-light: oklch(0.65 0.2 280);
      --accent: oklch(0.7 0.12 70);
      --bg: oklch(0.15 0.02 270);
      --bg-secondary: oklch(0.18 0.015 270);
      --text: oklch(0.95 0 0);
      --text-muted: oklch(0.7 0 0);
      --border: oklch(0.25 0.01 270);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, oklch(0.2 0.06 280 / 0.4), transparent),
                  radial-gradient(ellipse 60% 40% at 70% 60%, oklch(0.18 0.04 70 / 0.2), transparent);
      z-index: -1;
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, 3%); }
    }

    .container {
      text-align: center;
      max-width: 560px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .logo span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 1px;
      margin: 0 auto 2.5rem;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 300;
      text-decoration: none;
      padding: 0.625rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact:hover {
      color: var(--text);
      border-color: var(--primary);
    }

    .portal-link {
      display: block;
      margin-top: 1.25rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 300;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .portal-link:hover {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--text-muted);
      opacity: 0.5;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Software <span>Crafting</span></div>
    <div class="divider"></div>
    <h1>Wir arbeiten an etwas Neuem.<br>Unsere Website entsteht gerade.</h1>
    <a href="mailto:daniel@software-crafting.de" class="contact">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      daniel@software-crafting.de
    </a>
    <a href="/portal/login" class="portal-link">Kundenportal</a>
  </div>
  <footer>
    <p>Software Crafting · Inh. Daniel Eberl</p>
  </footer>
</body>
</html>
