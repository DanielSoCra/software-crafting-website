# Add these blocks to the existing software-crafting.de server block

# Portal → Next.js (port 4322)
location /portal/ {
    proxy_pass http://[::1]:4322;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Portal static assets with long cache
location /portal/_next/ {
    proxy_pass http://[::1]:4322;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Backward compat: old Edge Function URL → new API route (remove after transition)
location /functions/v1/mood-board-feedback {
    proxy_pass http://[::1]:4322/portal/api/mood-board-feedback;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
